name: stylish
description: "A Stylish E-commerce App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.0.0
  provider: ^6.1.1
  dio: ^5.4.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  iconsax: ^0.0.8
  cloud_firestore: ^6.3.0
  google_sign_in: ^6.2.1
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^5.0.0
  image_picker: ^1.0.7
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  path_provider: ^2.1.2
  firebase_messaging: ^16.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  fl_chart: ^0.69.0
  mobile_scanner: ^5.0.0
  http: ^1.2.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E53935"
  adaptive_icon_foreground: "assets/icons/logo.png"

flutter_native_splash:
  color: "#E53935"
  image: assets/icons/logo.png
  color_dark: "#1a1a1a"
  image_dark: assets/icons/logo.png
  android: true
  ios: true
  android_12:
    image: assets/icons/logo.png
    icon_background_color: "#E53935"
    image_dark: assets/icons/logo.png
    icon_background_color_dark: "#1a1a1a"

flutter:
  uses-material-design: true
  assets:
    - assets/beauty/
    - assets/fashion/
    - assets/gift/
    - assets/icons/
    - assets/images/
    - assets/kid/
    - assets/men/
    - assets/products/
    - assets/women/