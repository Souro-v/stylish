name: stylish
description: "A Stylish E-commerce App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  provider: ^6.1.1

  # Network & Cache
  dio: ^5.4.0
  cached_network_image: ^3.3.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Icons
  iconsax: ^0.0.8

  # UI
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/products/